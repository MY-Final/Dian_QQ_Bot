version: '3.8'

# Windows 专用 Docker Compose 配置
# 使用 Docker Desktop 的 npipe 方式连接 Docker

x-postgres-env: &postgres-env
  POSTGRES_USER: ${DB_USER:-postgres}
  POSTGRES_PASSWORD: ${DB_PASSWORD:-Mima123456.@}
  POSTGRES_DB: ${DB_NAME:-dian_bot}
  TZ: Asia/Shanghai

x-api-env: &api-env
  # 数据库配置
  DB_HOST: postgres
  DB_PORT: 5432
  DB_NAME: ${DB_NAME:-dian_bot}
  DB_USER: ${DB_USER:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-Mima123456.@}
  # 应用配置
  DEBUG: ${DEBUG:-false}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  HOST: 0.0.0.0
  PORT: 18080
  # Docker 配置 (Windows 使用 npipe)
  DOCKER_HOST: npipe:////./pipe/docker_engine
  CONTAINER_PREFIX: dian
  NAPCAT_IMAGE: mlikiowa/napcat-docker:latest
  PORT_RANGE_START: 30000
  PORT_RANGE_END: 40000
  # 编码配置
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: 1

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "3"

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: dian-qq-bot-postgres
    restart: unless-stopped
    environment: *postgres-env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_EXPOSE_PORT:-5500}:5432"
    networks:
      - dian_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-dian_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # Dian QQ Bot 单容器应用（前端 + 后端）
  app:
    image: ${DIAN_IMAGE:-dian-qq-bot:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dian-qq-bot
    restart: unless-stopped
    environment: *api-env
    volumes:
      # 应用数据 (Windows 路径)
      - ./data:/app/data
      - ./logs:/app/logs
      - ./instances:/app/instances
      # Windows 不挂载 socket，使用 DOCKER_HOST 环境变量
    ports:
      - "${APP_PORT:-16788}:16788"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dian_network
    healthcheck:
      test: ["CMD-SHELL", "powershell -Command \"try { (New-Object Net.WebClient).DownloadString('http://localhost:16788/health') } catch { exit 1 }\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging

networks:
  dian_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
