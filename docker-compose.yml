# Docker Compose 配置文件
# 支持 Windows 和 Linux

x-postgres-env: &postgres-env
  POSTGRES_USER: ${DB_USER:-postgres}
  POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_now_123!}
  POSTGRES_DB: ${DB_NAME:-dian_bot}
  TZ: Asia/Shanghai

x-api-env: &api-env
  # 数据库配置（使用 docker 内部网络）
  DB_HOST: postgres
  DB_PORT: 5432
  DB_NAME: ${DB_NAME:-dian_bot}
  DB_USER: ${DB_USER:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-changeme_now_123!}
  # 应用配置
  DEBUG: ${DEBUG:-false}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  # JWT 配置
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-to-a-strong-secret-before-production}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_HOURS: ${ACCESS_TOKEN_EXPIRE_HOURS:-24}
  REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
  HOST: 0.0.0.0
  PORT: 8000
  # Docker 配置
  CONTAINER_PREFIX: dian
  NAPCAT_IMAGE: mlikiowa/napcat-docker:latest
  PORT_RANGE_START: 30000
  PORT_RANGE_END: 40000
  # 编码配置
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: 1

x-logging: &default-logging
  driver: "local"
  options:
    max-size: "100m"
    max-file: "3"
    compress: "true"

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: dian-qq-bot-postgres
    restart: unless-stopped
    environment: *postgres-env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - dian_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-dian_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # 后端 API 服务
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: dian-qq-bot-api
    restart: unless-stopped
    environment: *api-env
    volumes:
      # 应用数据
      - ./data:/app/data
      - ./logs:/app/logs
      - ./instances:/app/instances
      # Linux: 挂载 Docker Socket
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dian_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging

  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: dian-qq-bot-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - api
    networks:
      - dian_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

networks:
  dian_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
